<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>한일교회 요람</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{--bg:#0a0a0b;--surface:rgba(255,255,255,.06);--card:#141416;--line:rgba(255,255,255,.1);--text:#f4f1ea;--muted:#8c887e;--gold:#c9a24b;--green:#43d17a;--red:#ff6b6b;--blue:#5aa7ff;--cyan:#43d1d1}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Manrope',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  .screen{display:none;min-height:100vh}
  .screen.on{display:flex;flex-direction:column}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:30px;line-height:1.6}
  .muted{color:var(--muted)}

  /* 로그인 */
  .auth{padding:72px 28px 40px;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;width:100%}
  .logo-wrap{text-align:center;margin-bottom:40px}
  .cross{position:relative;width:42px;height:60px;margin:0 auto 14px}
  .cross::before{content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);width:13px;height:100%;background:#fff;border-radius:3px}
  .cross::after{content:"";position:absolute;left:0;top:17px;width:100%;height:13px;background:#fff;border-radius:3px}
  .brand{font-size:28px;font-weight:800;letter-spacing:-.02em}
  .brand b{color:var(--gold)}
  .sub{font-size:14px;color:var(--muted);margin-top:6px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:14px 16px;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:12px;color:var(--text);font-family:'Manrope';font-size:15px}
  .field textarea{resize:vertical;min-height:84px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
  .field select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%238c887e' d='M6 8L0 0h12z'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:40px}
  .go{width:100%;padding:15px;margin-top:18px;background:#fff;color:#000;border:none;border-radius:13px;font-family:'Manrope';font-weight:800;font-size:16px;cursor:pointer}
  .go:disabled{opacity:.5;cursor:default}
  .msg{margin-top:14px;font-size:14px;text-align:center;min-height:18px;line-height:1.5}
  .msg.err{color:var(--red)} .msg.ok{color:var(--green)}
  .legal{font-size:11px;color:var(--muted);text-align:center;margin-top:auto;padding-top:40px;line-height:1.6}

  /* 앱 셸 */
  #appScreen.on{display:flex;flex-direction:column;height:100vh;height:100dvh}
  .views{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .views::-webkit-scrollbar{width:0}
  .view{display:none;padding:max(env(safe-area-inset-top),18px) 0 24px}
  .view.on{display:block}
  .vhead{padding:0 22px 6px}
  .vhead h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .vhead h1 b{color:var(--gold)}
  .vhead .vsub{font-size:13px;color:var(--muted);margin-top:3px}

  /* 하단 탭바 */
  .tabbar{flex-shrink:0;display:flex;background:#0e0e10;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  .tabbar button{flex:1;background:none;border:none;color:var(--muted);font-family:'Manrope';padding:9px 0 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ti{font-size:20px;line-height:1}
  .tabbar button span{font-size:11px;font-weight:600}
  .tabbar button.on{color:var(--gold)}
  .tabbar button.hidden{display:none}

  /* 홈 카드 */
  .hcard{margin:12px 18px 0;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .hcard h3{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .hcard h3 .em{font-size:16px}
  .announce{margin:12px 18px 0;background:rgba(67,209,209,.12);border:1px solid rgba(67,209,209,.32);border-radius:14px;padding:14px 16px}
  .announce .t{font-weight:700;font-size:14px}
  .announce .b{font-size:13px;color:rgba(244,241,234,.85);margin-top:4px;white-space:pre-wrap}
  .stats{display:flex;gap:10px;margin:12px 18px 0}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
  .stat .n{font-size:24px;font-weight:800;color:var(--gold)}
  .stat .l{font-size:11px;color:var(--muted);margin-top:3px}
  .mini{display:flex;align-items:center;gap:11px;padding:9px 0}
  .mini:not(:last-child){border-bottom:1px solid rgba(255,255,255,.06)}
  .mini .ava{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:rgba(201,162,75,.16);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--gold);overflow:hidden}
  .mini .ava img{width:100%;height:100%;object-fit:cover}
  .mini .nm{font-weight:700;font-size:15px}
  .mini .ex{font-size:12px;color:var(--muted);margin-top:1px}
  .mini .rt{margin-left:auto;font-size:12px;color:var(--gold);font-weight:700}

  /* 분류 세그먼트 + 검색 */
  .seg{display:flex;background:var(--surface);border-radius:11px;padding:4px;margin:12px 18px 0}
  .seg button{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;font-family:'Manrope'}
  .seg button.on{background:rgba(255,255,255,.12);color:var(--text)}
  .y-search{margin:10px 18px 6px}
  .y-search input{width:100%;padding:12px 16px;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:12px;color:var(--text);font-family:'Manrope';font-size:15px}
  .y-search input:focus{outline:none;border-color:var(--gold)}
  .y-count{margin:0 22px 4px;font-size:12px;color:var(--muted)}
  .y-list{padding:0 12px}
  .y-group{font-size:13px;font-weight:700;color:var(--gold);margin:16px 10px 6px}
  .y-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:13px;cursor:pointer}
  .y-item:active{background:rgba(255,255,255,.06)}
  .y-ava{width:46px;height:46px;border-radius:50%;flex-shrink:0;background:rgba(201,162,75,.16);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--gold);overflow:hidden}
  .y-ava img{width:100%;height:100%;object-fit:cover}
  .y-info{flex:1;min-width:0}
  .y-name{font-weight:700;font-size:16px}
  .y-pos{font-size:12px;color:var(--cyan);font-weight:600;margin-left:6px}
  .y-meta{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* 상세 */
  .map-top{display:flex;justify-content:space-between;align-items:center;padding:max(env(safe-area-inset-top),14px) 16px 12px;background:#0a0a0b}
  .map-top button{background:rgba(255,255,255,.1);color:#fff;border:none;padding:9px 14px;border-radius:10px;font-family:'Manrope';font-size:14px;cursor:pointer}
  .map-title{font-size:15px;font-weight:700}
  .detail{flex:1;overflow-y:auto;padding:28px 24px 40px;text-align:center}
  .d-ava{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;background:rgba(201,162,75,.16);display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:700;color:var(--gold);overflow:hidden}
  .d-ava img{width:100%;height:100%;object-fit:cover}
  .d-name{font-size:26px;font-weight:800}
  .d-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0 4px}
  .d-chip{padding:6px 13px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid var(--line);font-size:13px;color:var(--text)}
  .d-bio{font-size:14px;color:rgba(244,241,234,.8);line-height:1.6;margin:14px 6px 0;text-align:center}
  .d-rows{margin-top:22px;text-align:left}
  .d-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid rgba(255,255,255,.07)}
  .d-row .k{width:64px;font-size:13px;color:var(--muted);flex-shrink:0}
  .d-row .v{font-size:15px;color:var(--text);flex:1}
  .d-row a.v{color:var(--blue);text-decoration:none}
  .d-admin{margin-top:24px;text-align:left}
  .btn-line{width:100%;padding:13px;background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line);border-radius:12px;font-family:'Manrope';font-weight:700;font-size:14px;cursor:pointer}

  /* MY / 폼 */
  .form-wrap{padding:8px 22px 30px;max-width:560px;margin:0 auto;width:100%}
  .myhead{text-align:center;padding:8px 0 6px}
  .myhead .d-ava{margin-bottom:10px}
  .photo-btn{display:inline-block;font-size:13px;color:var(--gold);background:rgba(201,162,75,.12);border:1px solid rgba(201,162,75,.35);padding:8px 14px;border-radius:20px;cursor:pointer;font-weight:700}
  .toggle{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text);margin:2px 0 14px}
  .toggle input{width:18px;height:18px;accent-color:var(--gold)}
  .big{width:100%;padding:15px;margin-top:8px;background:#fff;color:#000;border:none;border-radius:13px;font-family:'Manrope';font-weight:800;font-size:16px;cursor:pointer}
  .big:disabled{opacity:.5}
  .ghost{width:100%;padding:13px;margin-top:10px;background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line);border-radius:12px;font-family:'Manrope';font-weight:700;font-size:15px;cursor:pointer}
  .ghost.danger{color:var(--red)}
  .hr{height:1px;background:rgba(255,255,255,.1);margin:22px 0}

  /* 출석 */
  .att-ctl{display:flex;gap:8px;margin:12px 18px 0}
  .att-ctl input,.att-ctl select{flex:1;padding:11px 12px;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:11px;color:var(--text);font-family:'Manrope';font-size:14px}
  .att-bar{display:flex;align-items:center;justify-content:space-between;margin:14px 22px 4px}
  .att-bar .cnt{font-size:13px;color:var(--gold);font-weight:700}
  .att-item{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer}
  .att-item:active{background:rgba(255,255,255,.05)}
  .att-item .chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#000}
  .att-item.on .chk{background:var(--green);border-color:var(--green)}
  .att-item .nm{font-weight:600;font-size:15px}
  .att-item .dt{font-size:12px;color:var(--muted);margin-left:auto}
  .savebar{position:sticky;bottom:0;padding:12px 18px;background:linear-gradient(transparent,#0a0a0b 30%)}

  /* 모달 */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50;padding:30px}
  .modal-bg.on{display:flex}
  .modal{background:#1a1a1c;border:1px solid var(--line);border-radius:18px;padding:24px;max-width:360px;width:100%}
  .modal h3{font-size:17px;font-weight:800;margin-bottom:8px}
  .modal p{font-size:14px;color:var(--muted);margin-bottom:8px;line-height:1.5;white-space:pre-wrap;max-height:200px;overflow-y:auto}
  .modal input{width:100%;padding:14px;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:11px;color:#fff;font-family:'Manrope';font-size:16px;margin-top:6px}
  .modal-btns{display:flex;gap:8px;margin-top:16px}
  .modal-btns button{flex:1;padding:13px;border:none;border-radius:11px;font-family:'Manrope';font-weight:700;font-size:15px;cursor:pointer}
  .modal-btns .cancel{background:rgba(255,255,255,.1);color:#fff}
  .modal-btns .ok{background:#fff;color:#000}
  .modal-btns .danger{background:#fff;color:var(--red)}
</style>
</head>
<body>

<!-- 로그인 -->
<section class="screen on" id="authScreen">
  <div class="auth">
    <div class="logo-wrap"><div class="cross"></div><div class="brand">한일교회 <b>요람</b></div><div class="sub">교인 명부</div></div>
    <div class="field"><label>휴대폰 번호</label><input id="email" type="tel" autocomplete="username" inputmode="numeric" placeholder="01012345678"></div>
    <div class="field"><label>비밀번호</label><input id="password" type="password" autocomplete="current-password" placeholder="비밀번호"></div>
    <button class="go" id="goBtn">로그인</button>
    <div class="msg" id="msg"></div>
    <div class="legal">HANIL Pay와 같은 계정으로 로그인하세요.<br>한일교회 · 도봉구 방학로 57-17 · TEL. 02-954-9191</div>
  </div>
</section>

<!-- 메인 앱 -->
<section class="screen" id="appScreen">
  <div class="views">

    <!-- 홈 -->
    <div class="view on" id="homeView">
      <div class="vhead"><h1 id="homeHi">한일교회 <b>요람</b></h1><div class="vsub">교인 명부 · 실시간 업데이트</div></div>
      <div id="homeAnnounce"></div>
      <div class="stats" id="homeStats"></div>
      <div class="hcard"><h3><span class="em">🎂</span> 이번 달 생일</h3><div id="homeBirthdays"></div></div>
      <div class="hcard"><h3><span class="em">🌱</span> 새가족</h3><div id="homeNew"></div></div>
    </div>

    <!-- 명부 -->
    <div class="view" id="dirView">
      <div class="vhead"><h1>명부</h1></div>
      <div class="seg" id="dirSeg">
        <button data-mode="district" class="on">교구별</button>
        <button data-mode="position">직분별</button>
        <button data-mode="name">가나다</button>
      </div>
      <div class="y-search"><input id="dirSearch" type="search" placeholder="이름 · 직업으로 검색"></div>
      <div class="y-count" id="dirCount"></div>
      <div class="y-list" id="dirList"><div class="empty">불러오는 중…</div></div>
    </div>

    <!-- 가족 -->
    <div class="view" id="famView">
      <div class="vhead"><h1>가족</h1><div class="vsub">세대별 보기</div></div>
      <div class="y-list" id="famList"><div class="empty">불러오는 중…</div></div>
    </div>

    <!-- 출석 (관리자) -->
    <div class="view" id="attView">
      <div class="vhead"><h1>출석</h1><div class="vsub">예배별 출석 체크</div></div>
      <div class="att-ctl">
        <input id="attDate" type="date">
        <select id="attType">
          <option>주일오전</option><option>주일오후</option><option>수요예배</option><option>새벽기도</option><option>금요기도</option>
        </select>
      </div>
      <div class="att-bar"><span class="muted" id="attHint">날짜·예배를 선택하면 명단이 떠요</span><span class="cnt" id="attCount"></span></div>
      <div id="attList"></div>
      <div class="savebar"><button class="big" id="attSave">출석 저장</button></div>
    </div>

    <!-- MY -->
    <div class="view" id="myView">
      <div class="vhead"><h1>내 정보</h1><div class="vsub">내 특징을 직접 채워보세요</div></div>
      <div class="form-wrap">
        <div class="myhead">
          <div class="d-ava" id="myAva">—</div>
          <div><label class="photo-btn" for="myPhotoInput">📷 사진 변경</label></div>
          <input id="myPhotoInput" type="file" accept="image/*" style="display:none">
        </div>
        <div class="field"><label>전화번호</label><input id="myPhone" type="tel" placeholder="010-0000-0000"></div>
        <div class="field"><label>생일</label><input id="myBirth" type="date"></div>
        <div class="toggle"><input id="myLunar" type="checkbox"><label for="myLunar">음력 생일이에요</label></div>
        <div class="field"><label>성별</label><select id="myGender"><option value="">선택 안 함</option><option>남</option><option>여</option></select></div>
        <div class="field"><label>주소</label><input id="myAddress" type="text" placeholder="동네까지만 적어도 돼요"></div>
        <div class="field"><label>직업 · 사업장</label><input id="myJob" type="text" placeholder="예: 한일카페 운영 / 교사"></div>
        <div class="field"><label>은사 · 섬김</label><input id="myGifts" type="text" placeholder="예: 찬양 · 주방봉사 · 운전"></div>
        <div class="field"><label>자기소개</label><textarea id="myBio" placeholder="짧게 자기소개를 남겨보세요"></textarea></div>
        <button class="big" id="mySave">저장</button>
        <div class="hr"></div>
        <button class="ghost" id="myChangePw">🔑 비밀번호 변경</button>
        <button class="ghost danger" id="myLogout">로그아웃</button>
        <div class="muted" style="text-align:center;font-size:11px;margin-top:18px;line-height:1.6">교구·직분 수정은 HANIL Pay 앱의 '내 정보'에서 할 수 있어요.</div>
      </div>
    </div>

  </div>

  <!-- 하단 탭바 -->
  <nav class="tabbar" id="tabbar">
    <button data-tab="home" class="on"><span class="ti">🏠</span><span>홈</span></button>
    <button data-tab="dir"><span class="ti">📖</span><span>명부</span></button>
    <button data-tab="fam"><span class="ti">👨‍👩‍👧</span><span>가족</span></button>
    <button data-tab="att" id="tabAtt"><span class="ti">✅</span><span>출석</span></button>
    <button data-tab="my"><span class="ti">👤</span><span>나</span></button>
  </nav>
</section>

<!-- 교인 상세 -->
<section class="screen" id="detailScreen">
  <div class="map-top"><button id="detailBack">← 뒤로</button><div class="map-title" id="detailTitle">교인 정보</div><div style="width:56px"></div></div>
  <div class="detail" id="detailBody"></div>
</section>

<!-- 세대 상세 -->
<section class="screen" id="famDetailScreen">
  <div class="map-top"><button id="famBack">← 가족</button><div class="map-title" id="famTitle">세대</div><div style="width:56px"></div></div>
  <div class="detail" id="famBody" style="text-align:left"></div>
</section>

<!-- 모달 -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modalTitle">제목</h3>
    <p id="modalMsg">메시지</p>
    <input id="modalInput" style="display:none">
    <div class="modal-btns">
      <button class="cancel" id="modalCancel">취소</button>
      <button class="ok" id="modalOk">확인</button>
    </div>
  </div>
</div>

<script>
  // ── 로그인 아이디 규칙 ──────────────────────────────────────────────
  // 이 서비스의 로그인 아이디는 휴대폰 번호다.
  // GoTrue 는 이메일로 계정을 구분하므로, 번호를 받아
  // `01012345678@phone.hanil.or.kr` 형태의 발송되지 않는 주소로 바꿔 쓴다.
  //
  // ⚠️ 앱(LoginId.kt / LoginId.swift)과 signup Edge Function 에도 같은 규칙이 있다.
  //    한 곳만 고치면 로그인이 깨진다.
  const PHONE_EMAIL_DOMAIN = "phone.hanil.or.kr";
  function toLoginEmail(input){
    const t = (input || "").trim();
    if (t.includes("@")) return t.toLowerCase();   // 이메일로 만든 옛 계정 호환
    let d = t.replace(/\D/g, "");
    if (d.startsWith("82")) d = "0" + d.slice(2);
    return /^01[016789]\d{7,8}$/.test(d) ? d + "@" + PHONE_EMAIL_DOMAIN : null;
  }

  /* ⚙️ Supabase (HANIL Pay와 동일 프로젝트) */
  const SUPABASE_URL  = "https://omnpkfyzqzihksawyxfr.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbnBrZnl6cXppaGtzYXd5eGZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDQ4MTUsImV4cCI6MjA5NTE4MDgxNX0.9sq1RkQZEPDH8qxeLQO2ghwsHCzCCp2dYvnL8Qrr4tg";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const $ = (id)=>document.getElementById(id);
  function show(name){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on")); $(name+"Screen").classList.add("on"); }
  function setMsg(t,c){ const e=$("msg"); e.textContent=t; e.className="msg "+(c||""); }
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

  // ── 모달 ──
  function openModal({title, message, inputPlaceholder, okText="확인", okClass="ok", showCancel=true, onOk, onCancel}){
    $("modalTitle").textContent = title;
    $("modalMsg").textContent = message || "";
    const input = $("modalInput");
    if(inputPlaceholder!==undefined){ input.style.display="block"; input.placeholder=inputPlaceholder; input.value=""; }
    else { input.style.display="none"; }
    const ok=$("modalOk"); ok.textContent=okText; ok.className=okClass;
    ok.onclick=()=>{ const v=input.style.display==="block"?input.value:null; closeModal(); onOk&&onOk(v); };
    const cc=$("modalCancel"); cc.style.display=showCancel?"":"none";
    cc.onclick=()=>{ closeModal(); onCancel&&onCancel(); };
    $("modal").classList.add("on");
  }
  function closeModal(){ $("modal").classList.remove("on"); }
  function alertM(title, message){ openModal({title, message, okText:"확인", showCancel:false, onOk:()=>{}}); }

  // ── 로그인 ──
  let ME = { id:null, name:"", is_admin:false };
  $("goBtn").addEventListener("click", login);
  $("password").addEventListener("keydown", e=>{ if(e.key==="Enter") login(); });

  async function login(){
    const email=toLoginEmail($("email").value), password=$("password").value;
    if(!email||!password){ setMsg("휴대폰 번호와 비밀번호를 입력하세요.","err"); return; }
    const btn=$("goBtn"); btn.disabled=true; btn.textContent="로그인 중…"; setMsg("","");
    const { error } = await sb.auth.signInWithPassword({ email, password });
    btn.disabled=false; btn.textContent="로그인";
    if(error){ setMsg("로그인 실패 — 이메일/비밀번호를 확인하세요.","err"); return; }
    afterLogin();
  }

  async function afterLogin(){
    const { data:u } = await sb.auth.getUser();
    const { data:m, error } = await sb.from("members").select("name, status, is_admin").single();
    if(error){ setMsg("회원 정보를 불러오지 못했어요.","err"); return; }
    if(m.status==="blocked"){ setMsg("이용이 제한된 계정입니다. 관리자에게 문의해주세요.","err"); await sb.auth.signOut(); return; }
    if(m.status==="pending"){ setMsg("관리자 승인 대기 중이에요. 승인 후 명부를 볼 수 있어요.","err"); await sb.auth.signOut(); return; }
    ME = { id: (u && u.user && u.user.id) || null, name: m.name||"", is_admin: !!m.is_admin };
    $("tabAtt").classList.toggle("hidden", !ME.is_admin);
    await loadData();
    show("app");
    switchTab("home");
  }

  $("myLogout").addEventListener("click", ()=>{
    openModal({title:"로그아웃", message:"로그아웃 할까요?", okText:"로그아웃", okClass:"danger",
      onOk: async ()=>{ await sb.auth.signOut(); location.reload(); }});
  });
  $("myChangePw").addEventListener("click", ()=>{
    openModal({title:"비밀번호 변경", message:"새 비밀번호 (6자 이상)", inputPlaceholder:"새 비밀번호", okText:"변경",
      onOk: async (v)=>{ if(!v||v.length<6){ alertM("오류","비밀번호는 6자 이상이어야 해요."); return; }
        const {error}=await sb.auth.updateUser({password:v}); alertM(error?"실패":"완료", error?error.message:"비밀번호가 변경됐어요."); }});
  });

  // ── 데이터 로드 ──
  let DATA = [];
  async function loadData(){
    const { data, error } = await sb.rpc("yoram_list");
    if(error){ DATA=[]; console.warn(error); return; }
    DATA = data || [];
  }

  // ── 공통 유틸 ──
  function initial(name){ return (name||"?").trim().slice(-2); }
  function avaHtml(m, cls){ return m.photo_url ? `<div class="${cls}"><img src="${esc(m.photo_url)}" alt=""></div>` : `<div class="${cls}">${esc(initial(m.name))}</div>`; }
  function fmtBirth(d, lunar){ if(!d) return "—"; const p=d.split("-"); return `${p[0]}.${p[1]}.${p[2]}${lunar?" (음력)":""}`; }

  const DISTRICT_ORDER = ["1교구","2교구","3교구","4교구","새가족교구","영아교구","유치교구","초등1교구","초등2교구","중고등교구","청년교구","무교구","장기결석","교구 미지정"];
  const POSITION_ORDER = ["목사","전도사","장로","안수집사","권사","집사","교사","찬양대","청년부","성도"];
  function primaryPos(positions){ const arr=Array.isArray(positions)?positions:[]; for(const p of POSITION_ORDER){ if(arr.includes(p)) return p; } return arr[0]||"성도"; }
  const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  function chosung(name){ const ch=(name||"").trim(); if(!ch) return "#"; const c=ch.charCodeAt(0); if(c>=0xAC00&&c<=0xD7A3) return CHO[Math.floor((c-0xAC00)/588)]; return "#"; }

  // ── 탭 전환 ──
  document.querySelectorAll("#tabbar button").forEach(b=> b.addEventListener("click", ()=>switchTab(b.dataset.tab)));
  function switchTab(tab){
    document.querySelectorAll("#tabbar button").forEach(b=>b.classList.toggle("on", b.dataset.tab===tab));
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
    $(tab+"View").classList.add("on");
    const v=$("appScreen").querySelector(".views"); if(v) v.scrollTop=0;
    if(tab==="home") renderHome();
    if(tab==="dir") renderDir();
    if(tab==="fam") renderFam();
    if(tab==="att") initAtt();
    if(tab==="my") fillMy();
  }

  // ── 홈 ──
  async function renderHome(){
    $("homeHi").innerHTML = `${esc(ME.name)}님, <b>환영합니다</b>`;
    try{
      const { data } = await sb.from("announcements").select("title, body, is_active").eq("is_active",true).limit(1);
      $("homeAnnounce").innerHTML = (data&&data.length)
        ? `<div class="announce"><div class="t">📢 ${esc(data[0].title||"")}</div>${data[0].body?`<div class="b">${esc(data[0].body)}</div>`:""}</div>` : "";
    }catch(e){ $("homeAnnounce").innerHTML=""; }
    const districts = new Set(DATA.map(m=>m.district).filter(Boolean));
    $("homeStats").innerHTML = `
      <div class="stat"><div class="n">${DATA.length}</div><div class="l">전체 교인</div></div>
      <div class="stat"><div class="n">${districts.size}</div><div class="l">교구</div></div>
      <div class="stat"><div class="n">${DATA.filter(m=>m.photo_url).length}</div><div class="l">사진 등록</div></div>`;
    const mon = new Date().getMonth()+1;
    const bdays = DATA.filter(m=>m.birth_date && Number(m.birth_date.split("-")[1])===mon)
      .sort((a,b)=>Number(a.birth_date.split("-")[2])-Number(b.birth_date.split("-")[2]));
    $("homeBirthdays").innerHTML = bdays.length ? bdays.map(m=>`
      <div class="mini" data-id="${m.id}">${avaHtml(m,"ava")}
        <div><div class="nm">${esc(m.name)}</div><div class="ex">${esc(m.district||"")}</div></div>
        <div class="rt">${Number(m.birth_date.split("-")[2])}일</div></div>`).join("") : '<div class="muted" style="font-size:13px">이번 달 생일자가 없어요.</div>';
    const news = DATA.filter(m=>m.registered_at).sort((a,b)=>b.registered_at.localeCompare(a.registered_at)).slice(0,5);
    $("homeNew").innerHTML = news.length ? news.map(m=>`
      <div class="mini" data-id="${m.id}">${avaHtml(m,"ava")}
        <div><div class="nm">${esc(m.name)}</div><div class="ex">${esc(m.district||"")}</div></div>
        <div class="rt">${esc((m.registered_at||"").slice(0,10))}</div></div>`).join("") : '<div class="muted" style="font-size:13px">등록일이 입력된 새가족이 없어요.</div>';
    $("homeView").querySelectorAll(".mini").forEach(el=> el.addEventListener("click", ()=>openDetail(el.dataset.id)));
  }

  // ── 명부 ──
  let dirMode = "district";
  document.querySelectorAll("#dirSeg button").forEach(b=> b.addEventListener("click", ()=>{
    document.querySelectorAll("#dirSeg button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    dirMode=b.dataset.mode; renderDir();
  }));
  $("dirSearch").addEventListener("input", renderDir);

  function renderDir(){
    const q=$("dirSearch").value.trim();
    let list = DATA.filter(m=> !q || (m.name||"").includes(q) || (m.job||"").includes(q));
    $("dirCount").textContent = `총 ${list.length}명`;
    const box=$("dirList");
    if(!list.length){ box.innerHTML='<div class="empty">결과가 없어요.</div>'; return; }
    const groups={}; let orderArr=[];
    if(dirMode==="district"){ list.forEach(m=>{ const g=m.district||"교구 미지정"; (groups[g]=groups[g]||[]).push(m); }); orderArr=DISTRICT_ORDER; }
    else if(dirMode==="position"){ list.forEach(m=>{ const g=primaryPos(m.positions); (groups[g]=groups[g]||[]).push(m); }); orderArr=POSITION_ORDER; }
    else { list.forEach(m=>{ const g=chosung(m.name); (groups[g]=groups[g]||[]).push(m); }); orderArr=CHO.concat(["#"]); }
    const keys=Object.keys(groups).sort((a,b)=>{ const ia=orderArr.indexOf(a), ib=orderArr.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib); });
    box.innerHTML = keys.map(g=>{
      const rows=groups[g].map(m=>{
        const pos=Array.isArray(m.positions)&&m.positions.length?m.positions.join(" "):"";
        const sub=m.job?esc(m.job):(m.phone?esc(m.phone):"");
        return `<div class="y-item" data-id="${m.id}">${avaHtml(m,"y-ava")}
          <div class="y-info"><div class="y-name">${esc(m.name)}${pos?`<span class="y-pos">${esc(pos)}</span>`:""}</div>
          <div class="y-meta">${sub}</div></div></div>`;
      }).join("");
      return `<div class="y-group">${esc(g)} · ${groups[g].length}명</div>${rows}`;
    }).join("");
    box.querySelectorAll(".y-item").forEach(el=> el.addEventListener("click", ()=>openDetail(el.dataset.id)));
  }

  // ── 가족 ──
  function renderFam(){
    const box=$("famList");
    const hh={};
    DATA.forEach(m=>{ if(!m.household_id) return; (hh[m.household_id]=hh[m.household_id]||{name:m.household_name||"이름 없는 세대", members:[]}).members.push(m); });
    const ids=Object.keys(hh);
    if(!ids.length){ box.innerHTML='<div class="empty">아직 묶인 세대가 없어요.<br>관리자가 세대를 만들면 여기 표시돼요.</div>'; return; }
    ids.sort((a,b)=>hh[a].name.localeCompare(hh[b].name,"ko"));
    box.innerHTML = ids.map(id=>{
      const h=hh[id];
      const head=h.members.find(m=>m.household_role==="가장")||h.members[0];
      return `<div class="y-item" data-hh="${id}">${avaHtml(head,"y-ava")}
        <div class="y-info"><div class="y-name">${esc(h.name)}</div>
        <div class="y-meta">${h.members.map(m=>esc(m.name)).join(", ")}</div></div>
        <div class="y-pos">${h.members.length}명</div></div>`;
    }).join("");
    box.querySelectorAll(".y-item").forEach(el=> el.addEventListener("click", ()=>openFam(el.dataset.hh)));
  }
  function openFam(hhId){
    const members=DATA.filter(m=>String(m.household_id)===String(hhId));
    if(!members.length) return;
    const name=members[0].household_name||"세대";
    show("famDetail"); $("famTitle").textContent=name;
    const order={"가장":0,"배우자":1,"자녀":2,"부모":3,"기타":9};
    members.sort((a,b)=>(order[a.household_role]??5)-(order[b.household_role]??5));
    $("famBody").innerHTML = `<h2 style="font-size:22px;font-weight:800;margin:4px 6px 16px">${esc(name)}</h2>` +
      members.map(m=>`<div class="y-item" data-id="${m.id}">${avaHtml(m,"y-ava")}
        <div class="y-info"><div class="y-name">${esc(m.name)}<span class="y-pos">${esc(m.household_role||"")}</span></div>
        <div class="y-meta">${esc(m.phone||"")}</div></div></div>`).join("");
    $("famBody").querySelectorAll(".y-item").forEach(el=> el.addEventListener("click", ()=>openDetail(el.dataset.id)));
  }
  $("famBack").addEventListener("click", ()=>show("app"));

  // ── 상세 ──
  $("detailBack").addEventListener("click", ()=>show("app"));
  function openDetail(id){
    const m=DATA.find(x=>String(x.id)===String(id)); if(!m) return;
    show("detail"); $("detailTitle").textContent=m.name||"교인 정보";
    const chips=(Array.isArray(m.positions)?m.positions:[]).map(p=>`<span class="d-chip">${esc(p)}</span>`).join("");
    const row=(k,v,href)=> v?`<div class="d-row"><div class="k">${k}</div>${href?`<a class="v" href="${href}">${esc(v)}</a>`:`<div class="v">${esc(v)}</div>`}</div>`:"";
    const admin = ME.is_admin ? `<div class="d-admin"><button class="btn-line" id="visitBtn">🏠 심방 기록 보기 · 추가</button></div>` : "";
    $("detailBody").innerHTML = `${avaHtml(m,"d-ava")}
      <div class="d-name">${esc(m.name||"—")}</div>
      <div class="d-chips">${chips}</div>
      ${m.bio?`<div class="d-bio">${esc(m.bio)}</div>`:""}
      <div class="d-rows">
        ${row("교구", m.district)}
        ${row("전화", m.phone, m.phone?`tel:${m.phone}`:"")}
        ${row("생일", fmtBirth(m.birth_date,m.is_lunar_birthday)!=="—"?fmtBirth(m.birth_date,m.is_lunar_birthday):"")}
        ${row("직업", m.job)}
        ${row("은사", m.gifts)}
        ${row("주소", m.address)}
        ${row("세대", m.household_name?`${m.household_name}${m.household_role?" ("+m.household_role+")":""}`:(m.household_role||""))}
      </div>${admin}`;
    if(ME.is_admin) $("visitBtn").addEventListener("click", ()=>openVisits(m));
  }

  // ── 심방 (관리자) ──
  async function openVisits(m){
    const { data } = await sb.from("visitations").select("visit_date, visit_type, notes").eq("member_id", m.id).order("visit_date",{ascending:false});
    const listTxt = (data&&data.length) ? data.map(v=>`• ${v.visit_date} ${v.visit_type||""}${v.notes?" - "+v.notes:""}`).join("\n") : "기록이 없어요.";
    openModal({ title:`${m.name} 심방`, message:listTxt, inputPlaceholder:"새 심방 메모 (예: 가정심방 - 건강 기도)", okText:"추가",
      onOk: async (v)=>{ if(!v) return;
        const { error } = await sb.from("visitations").insert({ member_id:m.id, visited_by:ME.id, visit_date:new Date().toISOString().slice(0,10), visit_type:"가정심방", notes:v });
        alertM(error?"실패":"기록됨", error?error.message:"심방 기록이 추가됐어요."); }});
  }

  // ── 출석 (관리자) ──
  let attBound=false, attPresent=new Set();
  function initAtt(){
    if(!$("attDate").value) $("attDate").value=new Date().toISOString().slice(0,10);
    if(!attBound){ $("attDate").addEventListener("change",loadAtt); $("attType").addEventListener("change",loadAtt); $("attSave").addEventListener("click",saveAtt); attBound=true; }
    loadAtt();
  }
  async function loadAtt(){
    const d=$("attDate").value, t=$("attType").value;
    $("attHint").textContent = `${d} · ${t}`;
    const { data } = await sb.from("attendances").select("member_id").eq("service_date",d).eq("service_type",t);
    attPresent = new Set((data||[]).map(r=>r.member_id));
    const box=$("attList");
    box.innerHTML = DATA.map(m=>`<div class="att-item ${attPresent.has(m.id)?"on":""}" data-id="${m.id}">
      <div class="chk">✓</div><div class="nm">${esc(m.name)}</div><div class="dt">${esc(m.district||"")}</div></div>`).join("");
    box.querySelectorAll(".att-item").forEach(el=> el.addEventListener("click", ()=>{
      const id=el.dataset.id; if(attPresent.has(id)){attPresent.delete(id);el.classList.remove("on");} else {attPresent.add(id);el.classList.add("on");}
      $("attCount").textContent=`출석 ${attPresent.size}명`;
    }));
    $("attCount").textContent=`출석 ${attPresent.size}명`;
  }
  async function saveAtt(){
    const d=$("attDate").value, t=$("attType").value, btn=$("attSave");
    btn.disabled=true; btn.textContent="저장 중…";
    await sb.from("attendances").delete().eq("service_date",d).eq("service_type",t);
    const rows=[...attPresent].map(id=>({member_id:id, service_date:d, service_type:t, present:true}));
    let err=null; if(rows.length){ const r=await sb.from("attendances").insert(rows); err=r.error; }
    btn.disabled=false; btn.textContent="출석 저장";
    alertM(err?"저장 실패":"저장 완료", err?err.message:`${d} ${t} 출석 ${rows.length}명 저장됐어요.`);
  }

  // ── MY ──
  function myRecord(){ return DATA.find(m=>String(m.id)===String(ME.id)) || {}; }
  function fillMy(){
    const m=myRecord();
    $("myAva").innerHTML = m.photo_url ? `<img src="${esc(m.photo_url)}" alt="">` : esc(initial(m.name||ME.name));
    $("myPhone").value=m.phone||""; $("myBirth").value=m.birth_date||""; $("myLunar").checked=!!m.is_lunar_birthday;
    $("myGender").value=m.gender||""; $("myAddress").value=m.address||""; $("myJob").value=m.job||"";
    $("myGifts").value=m.gifts||""; $("myBio").value=m.bio||"";
  }
  $("mySave").addEventListener("click", async ()=>{
    const btn=$("mySave"); btn.disabled=true; btn.textContent="저장 중…";
    const { error } = await sb.rpc("yoram_update_me", {
      p_phone:$("myPhone").value.trim(), p_address:$("myAddress").value.trim(),
      p_birth_date:$("myBirth").value||null, p_is_lunar:$("myLunar").checked,
      p_gender:$("myGender").value||null, p_job:$("myJob").value.trim(),
      p_bio:$("myBio").value.trim(), p_gifts:$("myGifts").value.trim()
    });
    btn.disabled=false; btn.textContent="저장";
    if(error){ alertM("저장 실패", error.message); return; }
    await loadData(); fillMy();
    alertM("저장 완료","내 정보가 저장됐어요.");
  });
  $("myPhotoInput").addEventListener("change", async (e)=>{
    const file=e.target.files[0]; if(!file) return;
    $("myAva").innerHTML='<span style="font-size:13px;color:var(--muted)">업로드중…</span>';
    try{
      const { data:u } = await sb.auth.getUser(); const uid=u.user.id;
      const path=`${uid}/avatar.jpg`;
      const up=await sb.storage.from("yoram-photos").upload(path, file, { upsert:true, contentType:file.type });
      if(up.error) throw up.error;
      const { data:pub } = sb.storage.from("yoram-photos").getPublicUrl(path);
      const url=pub.publicUrl + "?t=" + Date.now();
      const { error } = await sb.rpc("yoram_set_photo", { p_url:url });
      if(error) throw error;
      await loadData(); fillMy();
    }catch(err){ alertM("사진 업로드 실패", err.message||"잠시 후 다시 시도해주세요."); fillMy(); }
    e.target.value="";
  });

  // ── 시작 ──
  sb.auth.getSession().then(({data})=>{ if(data.session) afterLogin(); });
  if("serviceWorker" in navigator){ window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
